  - {type: variant, offset: 4608, length: 68, content: 第四「去此不遠」下指示後友，亦以證同。又禪依進發，故云不遠。禪故寂靜，入俗演法化物深廣，故云音海。然此神即普救之母，表真精進却從定生，起心動念是妄非進故。餘可知, 甲: ''}
