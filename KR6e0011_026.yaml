body:
  text: 唐清涼山大華嚴寺沙門澄觀撰十回向品第二十五初來意者當會序分已彰正宗宜顯故又已總示所依佛智次別顯能依行位故次來也二釋名者回者轉也向者趣也轉自萬行趣向三處故名回向回向不同有其十種然十之別名本分當釋回向通稱今當重明隨境所向義有衆多以義通收不出三處謂衆生菩提及以實際上二皆隨相實際即離相開三為十一回自向他故初回向云若有善根不欲饒益一切衆生不名回向二回少向多故下文云善根雖少普攝衆生以歡喜心廣大回向又云隨一善根普以衆生而為所緣乃名回向三回自因行向他因行故第三回向云菩薩以諸善根回向佛已復即以此善根回向一切菩薩所謂願未滿者令得願滿心未淨者令得清淨四回因向果此復二種一向自果下文云修諸善根回向阿耨菩提故深密瑜伽梁攝論等大同此説二回向他果第三回向云願以我今所種善根令諸佛樂轉更增勝故五回劣向勝謂隨喜凡夫二乘之福回向無上菩提故六回比向證經文非一七回事向理故不壞回向云與諸法性相應回向入無作法成所作回向第六回向云永離依處到於彼岸故名回向永絶所作至於彼岸故名回向八回差別行向圓融行故如第九回向廣説九回世向出世故下文云所有善根皆悉隨順出世間法教化成熟一切衆生心常回向出世之道第六回向云永出諸蘊到於彼岸故名回向等十回順理事行向理所成事故廣如第八回向所説前十義中初三皆回向衆生次三皆回向菩提次二回向實際後二義通於果及與實際若依總云十回向即帶數釋若準梵本晉經皆云金剛幢菩薩十回向品則人法雙舉或人之法法之人人有法通二釋也三宗趣者以無邊行海順無盡大願為宗成就普賢法界德用為趣四釋文者文有十分一三昧分二加分三起分四本分五説分六瑞應分七結通分八證成分九偈讚勸修分十校量功德分初中金剛幢入者是衆首故表歸向高出等義故不異名説承佛神力彰入定緣入菩薩智光三昧者顯所入名揀異果定故云菩薩智即是體謂根本智光有三義一是證智前相如明得定等此約寄位在賢終故二光即根本智用對治無明故如大乘光明定等三光即後得了所緣故二智無礙朗照法界此約剛幢自體釋也第二入是下加分有三一總顯能加二辨加所為三正顯加相今初有二一明佛現二明讚善今初有五一標所因謂入是三昧已故十住中云以三昧力二十方下佛來近遠三有十下佛數多少上二顯位過行故云十萬四皆同下顯佛名同五而現下正明佛至餘如前説二咸稱讚下明佛讚善於中初標稱善次別歎得定後顯得定所因先別顯五因一伴佛神力二主佛宿願三主佛現威四説者智淨五聽者善根十住無聽者善根十行缺説者自力此則具二理應遍具而影略者表住初自悟行則捨己利他今則悲兼自他俱無障礙故也所以要此五力者因果主伴皆具足故謂法因久遠願遂將化故主伴加威非器不傳明因主自力非感不應顯因伴善根餘之差當如第三會後令汝下結前生後第二為令下辨加所為有二十二句分二前二十一別明所為後一結為所屬前中初十標所成後十一明所作亦猶十地前十自利後十利他前中初九內德後一外加謂得佛護持信等根故前中前八橫具諸德後一豎繼不斷從前所成明記決斷故前中前七法體後一大用佛神力者非神境通離世間品神力神通義有異故通謂無擁力謂幹能通多就外力多約內就前七中前六別明後一總説謂一門之中具於多門總攝福智重重無盡名普門法界故就前六中前五所具後一離過謂所具福智不與二礙有漏相應故前五中前四智慧後一福德就智慧中前三自分後一勝進住佛智故就自分中前二説教後一入證謂入緣起法界相即自在智故前中無畏則於緣無懼辨才常説不斷上來從後褶疊已釋所成二以無量下明其所作於中初一總謂廣説故後十別於中初一約法次三約位一攝地前二安地上三照佛果次三約修一令開發十向大願二令解實際三令知回向廣大與法界等後三約人一稱根令喜二喜故學三世佛回向三救護一切衆生故不斷佛種後一總結所屬者謂若説十向前益皆成故加所為即説所為六相融攝如理應思然約行布地約説地此為回向故與下不同況彼義皆次第今復反此第三佛子下正顯加相於中三初語業勸説以增辨二意業冥加以益智三身業摩頂以增威今初口加承語便故文有十句初總餘別總云説此法者有二種力一者他力如經得佛護念故此亦名果力亦名增上緣力二者自力即下八句亦名因位力亦是因緣力是故此法要自他因果親疏融合方得有説自力八中初三明有作淨法力一總謂既住佛家理宜宣法以行家業下二別一長無漏功德二入總持智慧故在佛家次二句無作淨法力一離所淨障謂無二障礙二得所淨智謂事理普照後三顯身淨力即三種盡一二乘不同盡謂雙集悲智離於捨悲入寂過失故二菩薩盡謂離心意識唯依大智法身境故三者佛盡無障礙智是佛法故此是地前有三盡者一圓教普賢位融攝故二約金剛幢內德位已極故又前加所為中住行但有十句正口加中唯有一句今並過前者表位增故鄰於地故多同地經二爾時下意加中二先正明加相二何以下釋偏加所以前中十句初總餘別然此十句大同地經唯五六前却餘如彼次後別中一不著辨才説法不斷無留礙故二堪辨才以善淨堪智有四種謂緣法作成故云分別句義三任放辨才説不待次言辭不斷處處隨意有忘名義故云無礙法光忘不隨意則有礙故四即第五不雜辨才三種同智常現在前者慧身平等知三相故故彼云與遍至一切處智五即第四能説辨才有淨音故六教出辨才靜鑒雙流故七不畏辨才智不可壞何有畏哉或六七前却思之八即無量辨才謂一切法智隨順宣説修多羅等六種正見故九即同化辨才得一切佛無畏身等三種教化隨所度者顯示殊勝三業神變化故次釋偏加及爾時下身加并第三金剛幢下起分並如前後説第四告諸菩薩下本分中分二先總顯體相後佛子菩薩摩訶薩回向有幾下別示名相今初若直就經文應分為三初句總標願體難思希求名願即具攝普賢無盡願海深廣難思二充滿下顯難思相謂體充法界故難思議用普救護故稱為大又約體深不思議約用廣不思議又深廣無礙名不思議又體相用三並充法界隨所遍處無不救護實難思議三所謂下釋成難思以行同佛故然總論品內一一難思別示其相略申十種一體深二用廣如上已辨三攝德無盡四出生衆行五餘不能壞此三充滿法界中攝六都不自為七忍苦無倦八背恩不轉九逆順多端十盡窮來際此五普能救護中攝此之十句一一超於言念皆不思議故收前後有三種體一所依體即智光三昧二約剋性即上大願三約總含通有六法一定二智三願四悲五所依法界六通慧作用即不思議解脫以為體性而圓融無礙為回向體若取論勢亦初句是總下三句別一充滿法界即是勝願以是一切佛根本故二普救一切即是大願順作利益故三所謂學佛回向是不怯弱願決定入佛大願故亦未入地故無觀相及真實願大悲增故加前行住大願利益而住行中有無常愛果因今此缺者大悲既增惟願救護不欲自求菩提果故第二別示名相文分四別一舉名徵數二佛子下標數顯勝諸佛共説故三何等下徵數列名四佛子是為下結數引證三中先徵後列十回向義略以五門分別一釋名二義相三體性四定位五行法差別初中先總名已見品初後別名今當略釋然通相而辨有其二意一回向二字皆是能回之願救護等名皆是所回之行故皆依主受名二救護等名皆回向之別相回向二字皆別相之通名當名相望救護等即回向若互相揀是救護之回向非不壞之回向則通依主隨其義便不可局定第一救護等者大悲廣濟名為救護一切衆生大智無著故云離衆生相即是廣大不顛倒心回向是行謂以善根回成救生離相之行故名回向從所向立名故下文云願此善根普能饒益一切衆生明知救護非是所回自以十度為所回向耳又唯以離衆生相為能回者則回向中無隨相也將墜者護已墜者救救令脫苦護令息惡並以善根願能成此二於三寶等得不壞信以此善根用將回向三學三世佛所作回向名等諸佛四菩薩令其善根至一切處五由回向故能成無盡功德之藏六順理修善事理無違入於平等七以善根等心順益衆生八善根合如以成回向九不為相縛不於見著作用自在故名解脫如不思議解脫等十稱性起用謂以法界善根回向法界故至隨文中當更開顯第二顯義相者先別後通別中前七隨事行後三稱理行前中初一悲智不住明行本次四明行相於中一者起行心堅二約佛辨廣三約法顯遍四約德顯多下二行成一智行成二悲行成後三中一正與理合顯體深廣二明依體起無方大用三顯體用無礙圓明自在二通論一一中皆有三種回向謂以善根回向衆生菩提實際此三各有二義故成回向一以菩薩善根必由衆生而成是衆生之分故還向彼由餘二成餘二流故菩提分故稱實除故法爾向彼二凡是菩薩必為度生不爾同二乘故必求無上菩提是家法故不爾同凡小故必證實際背無明故照二空故所以要須三者義乃無邊略申十意謂依三法故滅三道故淨三聚戒顯三佛性成三寶會三身具三德得三菩提證三涅槃安住三種祕密藏故一依三法者謂真性觀照及與資成即起信論體相用也實際依體菩提依相衆生依用二滅三道者見苦實際方能滅苦照煩惱空即得菩提回結縛業為利生業三淨三聚者謂向實際故律儀離過向菩提故廣攝衆善向衆生者即是攝生也四顯三佛性者實際正因菩提了因向衆生者即是緣因五成三寶者實際成法菩提成佛向彼衆生成同體僧六會三身者謂法報化七具三德謂斷智恩八得三菩提謂實相菩提實智菩提方便菩提菩提樹下示成佛故九證三涅槃者謂性淨涅槃圓淨涅槃方便淨涅槃謂薪盡火滅若依地論唯有上二者則真極之成寧殊示滅菩提亦爾上四皆如次配回向實際菩提衆生可以意得十安住三種祕密藏者由向實際則住法身佛以法為身清淨如虛空故由向菩提能成般若菩提朗鑒居極照故由向衆生能成解脫自既無纍令他解脫隨機應現亦無礙解脫也以斯十義立三回向若立三種菩提之心亦依此十又此十內舉一為首展轉相由又此三者成二行故向實自利向生利他菩提通二又向實護煩惱向生護小乘菩提通二護又為成悲智智照理事故有三也又隨舉悲智亦具此三悲中三者令彼衆生知其實際同證菩提故智中三者照生相盡即同實際證菩提故又此三者其必相資一即具三方成其一一為證實際故回向衆生以化衆生成其自利斷障證實故亦向菩提速證菩提具一切智斷於二障方窮實故二為救衆生故回向實際速證實際於惑自在方能化故故淨名云若自有縛能解彼縛無有是處亦向菩提速證菩提方能廣利故地經云欲度衆生不離無障礙解脫智三為得菩提故回向衆生不化衆生不證果故亦向實際不證實際豈得菩提故此三事相資成立非唯三事自互相資隨一一事具攝法界德用即入無礙方名真實回向三事第三體性者有總有別總如前説謂大願等別在説分隨位顯之第四定位者若約資糧等五諸説不同一云此回向位是修大乘順解脫分資糧位終從十信來皆資糧故十回向後別立加行故莊嚴論説行盡一僧祇長養信令增上增上修達分善根又成唯識第九云初無數劫福智資糧順解脫分既圓滿已為入見道住唯識性復修加行雜集十一亦同此説有云此十回向是加行位復有二説一云四順決擇分中是後二攝謂十解為暖十行為頂前九回向為忍第十回向為世第一法成唯識云此四善根亦勝解行攝此文為證雖不分明玄奘三藏意存此釋一云四加行中世第一攝故真諦翻攝大乘云如須陀洹道前有四方便菩薩亦爾有四方便謂四十心若依此釋則無五位地前四十心皆加行故餘約四位十三住等並如十住品明上來多是大乘初門接引二乘擬議彼立四善根故有説三賢總為趣聖方便不分資糧加行遠近此據終説有言一切行位都不可説此約頓顯真性而説若依當部一位之中頓攝諸位不礙前後而位滿處即是因圓約圓教説然與前教相參應成四句一唯約相如前諸教二唯約自體如前頓説三以體從相四以性融相此二即當今文謂以性隨相性不差而位歷然以性融相相不壞而常相即故下一一位中具一切位非但融因亦常融果融果之因方是真因第五行法差別者行隨位別亦有圓融及寄法差別若對前教亦成四句準位應知有以十向配於十度隨勝受名雖位位所回皆具諸度以名收之亦有理在四結數引證可知第五佛子云何下説分説十回向即為十段一一段中皆先長行後明偈頌長行中各二初位行後位果有不具者至文當知位行中各三初牒名徵起二依徵廣釋三依釋結名文處可見今初回向文缺位果於位行中先牒名者具如本分又本業云常以無相心中常行六道而入果報不受而受諸受回易轉化故名救護等二廣釋中二先明所回善根後修善根時下正明回向今初古人名此以為行體若順前名救護衆生是悲離衆生相為智則以悲智為其行體以是初行故將總體以為別體若以為欲回向故修諸善根即彼善根亦得稱體古義依此後正明回向中二先明隨相回向後我應如日下明離相回向前即回向衆生及與菩提釋救護衆生後即回向實際釋離衆生相前中二先總明令物離苦至究竟菩提即雙明慈悲及二回向後菩薩摩訶薩下別顯文分為四一利樂救護二佛子菩薩於非親友下受惱救護三佛子菩薩見諸衆生下代苦救護四佛子菩薩以諸善根正回向下逈拔救護初中三一總標二我當下別顯三佛子下總結今初晉無菩薩等言而有復作是念之語彌顯前已回向別顯中文有十句初離苦果二離苦因三通因果五怖畏中含三道故上三通於深淺後七唯約究竟四得菩提五得涅槃六滅煩惱之源根本不覺若滅此者如天之大明七滅所知之暗故云一切無明即觸事不了者若滅於此如人執炬委悉而照八令得解脫故涅槃云澄渟清淨即真解脫已脫重昏故云燈也九令證法身故言真法十令成般若無二礙智亦是權實無礙之智三結中以前十句有通淺深故令究竟得一大事第二受惱救護中二先明受惱之相後佛子菩薩摩訶薩以諸佛法下明回向之相前中亦二先法後喻法中有標徵釋可知後喻中有二喻先大海不變喻喻遇惡緣不變本心海喻菩薩器量大故衆毒喻惡衆生不變喻菩薩不亂二日輪普照喻喻遇惡不息利益於中三初喻次合後徵釋喻中略有其二先日輪具德後遇緣不息有十一惡緣合中具合先合具德舉其十德以合於日影顯於日亦具十德一福德之輪已圓二智用深廣難測三正念遊空無有高下四慈風運用不退不疲五圓福智輪顯照空法六三乘山谷普照無私七使目覩萬像了真俗之義八使居自乘業以智成辦九常為利益晝夜無休十無器生盲亦不語捨後不以衆生下合非緣不阻於中有四不以具合十一事初一不以通合生盲先正合後但以下反合故出現品云無信無解毀戒毀見等皆名生盲若別合者弊惡合生盲邪見合乾城令人妄謂為實故瞋濁合修羅手日為帝釋先鋒彼瞋故覆障次不知思合閻浮樹崇巖邃谷次不以凡愚下合前塵霧煙雲以彼能遍空猶彼凡愚同一處住後不以衆生數起下合前時節改變謂頻起過惑乍善乍惡如彼晝夜陰陽失度等三何以下徵釋中先徵意云何以惡不厭捨釋意云悲智均故文中二初喻後合合中二初總合後不但下別合於中二初以大悲合日惡是其境本為一切豈獨揀於惡人如日普益寧復棄於稿木二如是已下以智合日善惡均照故第二明回向之相中二先辨回向之心後佛子下辨回向之願前中依悲智心行回向故於中二先緣境廣大上等佛心即以圓覺因果之法為所緣境圓明可貴所以稱寶後菩薩如是下悲成利樂下救物心於中先牒前起後生二種心一於上等佛得淨信心二下與衆生同大悲體由依此二成甚深等十心一契理故二自慶慶他故三離過故四超二乘故五定樂相應故餘五可知普為已下結其所用心順口故名為真實第二正辨回向之願文中二先願衆生令成法器二又作下令得法圓滿於中四一總舉遇緣得法二於諸佛下成自分德滿七財者即十藏前七三於諸佛所常隨下勝進德圓四令一切下明得果滿先標佛樂下二句釋故第三回向略明十種樂謂不可思議佛所住樂等又不思議法品略明十種無量住謂常住大悲等第三代苦救護中文分為三初總明代苦回向二復作是念我所修行下別明回向之心三佛子菩薩摩訶薩以諸善根如是回向所謂隨宜下總結成益今初分二初明先救重苦後菩薩爾時作是念言下念遍救諸苦今初有二先見苦興悲心堅不退堅有七相謂不捨所行不避苦事不驚忽至不怖迷倒不退大悲多苦不怯長苦無厭二何以下徵以釋成徵有二意一云生自造苦何干菩薩而欲代之二云劇苦難堪何為不厭釋意云本願荷故逢苦若厭焉能荷負二念遍救諸苦中二先救八苦八難等苦故有諸言隨業流轉是業繫苦邪見無智是愚癡苦我應已下起救之心二又諸衆生下救迷四諦苦文中分二初念苦境二菩薩見下正興悲救今初於中先不知集謂癡愛為本是煩惱道染著已下明其業道為有造行故名染著隨業入苦如彼鳥獸因食愛故入於籠檻作魔業行明有惡業福智都盡明無善業次常懷疑惑無生道見滅之因故不見安隱圓寂不知出離道諦在於生死苦諦二興悲救中起大悲心者令脫苦集故大饒益心者令得清淨滅道故故用善根回向大回向經者賢首云如圓教所説普賢回向故然藏內有大回向經此教最初不應指彼若結集從簡於理可然第二別明代苦回向之心中有五復念前三明代苦之心後二明回向之心今初即分為三初明一向普救無自為心次衆苦備受無懈怠心三決志保護無虛妄心初文可知二中復二先正明後徵釋今初言大壑者如尾閭壑飲縮衆生無暫已故後徵釋中先徵意云何以獨為衆生備受衆苦復勤修耶釋云一身之苦令多解脫故願自受顯悲之深問衆生之苦自業所招自心所變云何菩薩而能代耶答通論代苦有其七義一以苦自要增悲念故瑜伽四十九問云菩薩從勝解行地隨入淨勝意樂地時云何超過諸惡趣等此問菩薩云何自離惡趣下答文廣意云謂菩薩於世間清淨靜慮已善積資糧於多苦有情修習哀愍無餘思惟由此修習故得哀愍意樂及悲意樂為利惡趣有情誓處惡趣如己舍宅設住惡趣能證菩提亦能忍受為除物苦願身代受令彼惡業永不現行一切善業常得現行由此悲願力故一切惡趣諸煩惱品所有麁重於自所依皆得除遣得入初地釋曰約此但有悲願意樂身不能代由悲決定自獲勝益二約菩薩本為利生求法苦行已名為代後能為物為增上緣亦名代受三約菩薩留惑同事受有苦身為生説法令不造苦因因亡果喪亦名代受四設有衆生欲造無間等業菩薩化止不從遂斷其命菩薩自受惡趣苦報令彼得免無間大苦名為代受此依梁攝論第十一説涅槃仙預國王亦同此義非唯意樂而已五由菩薩初修正願為生受苦至究竟位願成自在常在惡趣救代衆生如地藏菩薩及現莊嚴王等乃至飢世身為大魚皆其類也或以光明照觸或神力冥加其事非一六由菩薩此願契同真如彼衆生苦即同如性以同如之願還潛至即真之苦依此融通亦名代也七由普賢以法界為身一切衆生皆是法界即衆生受苦常是菩薩故名為代上來七義初但意樂次二但約為增上緣四五二義實能身代六七二義理觀融通問若依四五二義應能普代何故猶有衆生受苦答此有三義一有緣無緣故與菩薩有緣則可代也二業有定不定故不定者可代三若受苦有益菩薩令受方能究竟得離苦故如父母教子付嚴師令治如是密益非凡小所知第三決志保護中二先正明後徵釋徵意云云何不捨何名不虛釋有二意一異小乘不自為故二亦不為下明異凡夫著欲過故文中三初正明不求二徵釋所以所以不求者見多過故文中體即是苦復能生苦近障天樂況大菩提惑習雙亡今言淫欲即是道者善須得意三菩薩如是下結成前義第二有二復念明回向之心即分為二初念令彼得樂後念身為保護今初乘前欲苦故令得樂文有十句初總餘別別中前八涅槃後一菩提於涅槃中一住涅槃能建大事名為利益二滅心數三證無為四無能所五相不能遷六廣無分量七生死真性即是涅槃故無所捨智冥真理是以不退八一得永常湛然不滅依解節經説有五樂一出家樂脫家難故二遠離樂以斷欲得初禪故三寂靜樂二禪為首覺觀息故四菩提樂於法如實覺故五涅槃樂息化入無餘故彼通人天今唯究竟會釋可知二保護中初示安隱道令得菩提名知實義後又於下令度生死海得大涅槃名到彼岸第三總結成益中初總標所謂下別顯別中初句救護餘皆成益第四回拔救護謂孤標大志普為衆生而無冀望文中二先喻後合喻中有二一獨照喻二又諸下成益喻法合亦二先合獨照後修習下合前成益即正顯回向初之一句通其二勢一成前二標後所謂下別顯文有十句初總餘別照謂照機顧復之義見於毛詩餘文可知第二大段我應如日普照一切下離相回向於中二先以忘機之智導前大悲令成無緣後安置下正明大智離衆生相今初功高二儀而不仁明踰日月而彌昏故於中先正明無私不求恩故能容受惡為普照故不以一惡而捨衆多設盡背恩尚無嫌恨豈況一耶後善根雖少下顯成廣大大智導悲能普緣故如聲入角小亦遠聞第二正明離相回向謂向實際然一一隨相皆具如下諸句離相説有前後行在一心文分為二先正明離相後菩薩如是下總結成益前中義雖總通且取文便略分為二先會前回向衆生明入實際後以如是等下會前回向菩提明入實際然入實際即事理無礙故前段亦明不離蘊等後段亦明離我我所前中二先廣明離善根回向之相二解一切下雙結二相前中有二十一回向分四初十四句離所取相次二句離能取想三一句離能詮名言四有四句顯如如理由離妄想成正智故令前名相皆即如如今初初總餘別總謂令所向衆生契同所向實際故名安置實際即法性性自無著別中二前十入理後三離過今初初句遣所向衆生了自性故不著凝然不動隨緣不變二遣能回悲願不依於悲不取願相三遣所回善根四遣所獲果報五六二句雙明起行之身及所向衆生之相即真故不著即俗故不壞七遣所成業行八遣所得報相上四遣體九總顯諸事能成因緣十總明前事從緣所起明上回向不出前十由後二句故無性無性故即法性故無所著後三離過一不著虛名二不著報處三敬養等名虛妄法二離能取想中初句對所説能後句別無三倒謂於前諸事起心分別常無常等名為心倒於常等境取分齊相名為想倒於相執實名為見倒翻背正信立以倒名翻上名為不起三倒故大品十七彌勒語須菩提言新發意菩薩隨喜諸佛及佛弟子善根已回向菩提云何不墮想心見倒須菩提言於彼善根心不生想用此心回向菩提於此回向心亦不生心想如是回向則非想倒心倒見倒若取相回向為想心見倒光明覺品云若於一切智發生回向心見心無有生當獲大名稱此亦無三倒也若依大般若第二會隨喜回向品意則上諸事皆盡滅離變此中何者是諸事耶若菩薩知此一切乃至菩提皆無所有而復能行隨喜回向則非想心見倒以無所得為方便故然小乘或説想心見三次第而起或説一時義分前後心想非倒由見亂故立以倒名雖諸説一同皆六識建立若大乘中亦有多説一云依七識心義分三倒謂七識妄心性是乖理顛倒之法名為心倒依是心故便有一切妄境界生如依夢心有夢境起即於彼境妄取其相説為想倒於所取法執實分明説為見倒依此三倒於為無為境起常無常等八種顛倒諸宗異説恐厭繁文三離能詮名四有四句顯如如者前明妄空一切皆空此彰實有一切妙有又即前之空是此之實二義不二為真法印是即妄取回向菩薩不有真實回向菩薩不無文有四句初總顯實性次別約衆生三印諸事善四心絶貪求第二雙結者一句結所回善根善根可以獨修但云種植一句結回向行回向必有能所故觀無二如此則德本不生惑本不滅又惑纍寂然不生真德湛然不滅第二會前回向菩提入實際者又前明隨相次辨離相欲顯此二同時故雙非即離文中三初結前生後二非即下法喻釋成三離我下結成回向今初由前離相所行清淨故順出世無上菩提而言二者善根回向世與出世若有若無若即若離皆名為二今並無之二釋成中先法後喻法中二對初以所回善根對能回行願辨非即離明因中無二初句業非回向能所別故次句不離離業無可回故亦同淨名布施回向一切智為二布施性即是回向一切智性故不離斯為不二非即故無不二也後對因果相望初句果不即因後句離因無果文影略耳理應因果各有非即離義後喻中乘光發影及水月之影皆緣生無性非即非離故云清淨初二句以因對報報通十地故後二句以報對果三結成回向者能回之我所回我所若隨若離並稱動亂今照而常寂故離斯分別而不壞相故名方便第二總結成益者由隨離不二故成無礙離過之益及第三結名文並可知第二爾時下重頌分二先敘儀意於中初後二句説儀入深句義者説依以無量下亦是説依依此説故亦説所為為此説故後正陳偈詞二十八偈分二前八偈半頌所回善根前六四等一慈二悲一偈半喜一偈半捨如地無心故一偈結其普遍後二偈半明六度後如是下十九偈半頌回向行分二前七偈半頌隨相初一偈半頌利樂回向後六頌代苦回向餘略不頌未曾下十二偈頌前離相於中二前五頌正明離相後十方下七偈頌前成益文並可知自下入第二十四經第二不壞回向長行中二先位行後位果位行中三謂牒釋結今初牒名徵起謂於諦寶等十種勝境深信堅固得不壞名然十表無盡信通事理故本業云觀一切法但有用但有名念念不住故名不壞是知善根回向皆通事事無礙方真不壞耳第二佛子下依徵廣釋中三初舉所回善根二辨回向之行三明回向所為今初分二先明起不壞信後佛子下依信種善今初十句不出三寶四信初句佛寶次句僧寶餘皆法寶於中初句是總兼含理法餘七句別別中初一教法次四行法一大悲行二惡止善行行亦攝於戒三回向行四近友行次一果法後一重舉行法意欲總包其中理法即信真如第二依信種善根中二先種善根後令菩提下長菩薩道有十句初總餘別可知第二菩薩摩訶薩以如是等善根下明回向行中二先將善根回向後將勝報回向前中即雙向衆生菩提文中又二初正明回向後菩薩如是積集下結成今初先總明回向菩提之果願常下別明回向成得果之因文有十句初三行緣次二行因後五所成之行初成利他行即回向衆生意次三自利後一通二利二結成中九句前三通顯收攝亦是聞慧一積一至多二令至究竟三隨一使增次四皆思慧後二修慧起行為修習相應為安住二菩薩摩訶薩如是積集諸善根已下將勝報回向謂依回向得報復將回向通向三處文中二先明所回善根二如是修習無量功德下顯回向行今初又二先結前生後後於念念下正明供佛善根於中又二先總標後以阿僧祇下廣顯今初言如其所應者有二義一隨何所要如應即供二稱佛境界所應之供謂不以稱法界之供不能供稱法界之佛故二廣顯中四一廣列供事二明供佛三顯供意四結分齊今初廣列供事有六十七句為六初二十句雜門明內外之供下皆純門二座三經行處四宮殿五樹嚴六嚴宮殿亦純雜無礙可知二佛子下明供佛中二先供現佛後一一下明供舍利三為令一切下明供意有十一句可知四如是供養現在下結供分齊謂非唯如上所列故云不可盡第二如是修集下顯回向行中三初回向之心二回向之相三回向行成前中有三初不離大悲兼回向衆生之意無有執著下離妄契真即離相之意後諸佛下結前生後二與諸法性下回向之相兼顯回向菩提於中有十一句前六離相後五隨相三佛子下回向行成於中三初隨相行成二以清淨下離相行成三菩薩如是善巧下雙結二行無礙今初有三初牒前由前離相非唯不礙隨相亦能成此隨相次雖隨下正顯文有十句一由前法性相應故隨生死而不變二以入無作成所作故求一切智未曾退轉三由捨離想著故諸有不動四住多善巧能度衆生五永出諸有故不染有為六修行不住相故不失無礙智七普攝善根故因緣無盡八普淨大願故世法不動九發菩提心故具修諸度十由善根同住故具足十力如次配上後菩薩如是下結前生後即由前最上信解心生二明離相行成由前事不礙理故觸境了如於中初一句總了一切下別別中初唯心觀成次知業下緣生無性觀成次出生下法眼了真具菩薩下妙行無著亦如次配前一了心性故二業無作故三不起想故四行善巧故五諸有緣生故六行無住故七普攝無著故八諸行廣大故九了菩提性無有二唯一實故十由與善根同住故能具菩薩行十一由最上信解故於無漏白法無有廢捨若通由前則易可知三雙結二行無礙以成回向中初總明不迷理惑事故名善巧思惟後不違下別皆事理無礙可知第三菩薩摩訶薩以諸善根如是回向下回向所為初句總明後不斷下別顯於中前離魔業通一切惡後魔事業通一切相但違法印皆魔事故故下釋云以平等印普印諸業則離魔也餘句可知第二位果亦如十地調柔等果文中初牒得時次得見下正辨果相後菩薩下總結所屬第二偈頌二十五偈分三初二頌所回善根及第一節回向次十八偈頌所成供行復將回向後五偈頌回向所為二中亦二前八頌所回善根後十頌回向之行文中三初四頌回向之心次二頌回向之相後四頌回向行成所為可知
